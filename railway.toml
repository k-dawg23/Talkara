# Railway config-as-code: https://docs.railway.com/reference/config-as-code
# PORT is injected by Railway; Astro @astrojs/node reads PORT + HOST at runtime.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Dockerfile pins Node 22 (Astro 6). Nixpacks ignored NIXPACKS_NODE_VERSION / used Node 18 on some deploys.

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
