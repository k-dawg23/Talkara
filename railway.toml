# Railway config-as-code: https://docs.railway.com/reference/config-as-code
# PORT is injected by Railway; Astro @astrojs/node reads PORT + HOST at runtime.

[build]
builder = "nixpacks"
# Nixpacks already runs `npm ci` in the install phase. Do not run `npm ci` again here — a second
# `npm ci` hits EBUSY on `/app/node_modules/.cache` (Railway/Nixpacks cache mount).
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
